<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Taller JHB</title>
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#D6392F" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  :root{
    --bg:#14151A; --surface:#1D1F26; --surface-2:#262933; --border:#333744;
    --text:#EDEEF2; --text-dim:#8B8FA3; --accent:#D6392F; --info:#3A4FB0; --ok:#4FAE7A; --danger:#B23A3A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  .wrap{max-width:640px;margin:0 auto;padding:20px;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .jhb{font-weight:700;font-size:26px;font-style:italic;color:var(--accent);-webkit-text-stroke:1px #2a0d0a;}
  .tag{font-weight:700;font-size:11px;font-style:italic;line-height:1.2;color:var(--info);text-transform:uppercase;}
  .status-bar{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);margin-bottom:14px;}
  .dot{width:8px;height:8px;border-radius:99px;background:var(--ok);}
  .dot.off{background:var(--danger);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;}
  h2{margin-top:0;font-size:16px;}
  .dim{color:var(--text-dim);font-size:13px;}
  .btn{background:var(--accent);border:none;border-radius:8px;padding:10px 16px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;}
  .btn:disabled{opacity:0.6;}
  .error-box{background:rgba(178,58,58,0.12);border:1px solid var(--danger);color:#ffb4b0;padding:10px;border-radius:8px;font-size:12.5px;margin:10px 0;}
  .warn-box{background:rgba(224,185,60,0.1);border:1px solid #E0B93C;color:#E0B93C;padding:10px;border-radius:8px;font-size:12px;margin-top:12px;}
  .form-row{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}
  input{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:13px;flex:1;min-width:120px;}
  .lista{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;}
  .lista li{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13px;}
  .del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="./app.js"></script>
</body>
</html>
